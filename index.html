  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;}
    body{background:#f5f1e8;color:#2d2a24;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
    @keyframes spin{to{transform:rotate(360deg);}}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.25);border-radius:3px;}
    input,select,textarea,button{font-family:inherit;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#f5f1e8;z-index:9999;}
    .spin{width:32px;height:32px;border:2px solid rgba(63,92,58,0.2);border-top-color:#3f5c3a;border-radius:50%;animation:spin 0.8s linear infinite;}
    #errdiv{display:none;position:fixed;inset:0;background:#f5f1e8;color:#c0524a;padding:20px;font-size:12px;line-height:1.6;overflow:auto;white-space:pre-wrap;z-index:9999;}
  </style>
</head>

function loadData() {
  try {

      var saved = JSON.parse(raw);
      // Respect the user's data exactly - including anything they've deleted.
      // (New default content ships via a bumped STORAGE_KEY, not a live merge.)
      if (!saved.settings) saved.settings = Object.assign({}, DEFAULT_DATA.settings);
      ["beds", "plants", "tasks", "chemicals", "harvests", "journal"].forEach(function (key) {
        if (!Array.isArray(saved[key])) saved[key] = [];
      });
      return saved;
    }
  } catch (e) {}
  return DEFAULT_DATA;
}

  try {
